<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escáner de documentos</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; touch-action: manipulation; }
        .app { max-width: 720px; margin: 0 auto; padding: 1rem; }
        .header { text-align: center; margin-bottom: 0.5rem; }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .viewfinder { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; }
        .viewfinder video, .viewfinder canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .viewfinder canvas { z-index: 2; } /* capa de previsualización */
        /* Guía de encuadre (dibujada en canvas, no en CSS) */
        .controls { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.8rem; align-items: center; }
        .slider-group { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .slider-group label { font-size: 0.9rem; }
        .slider-group input[type=range] { flex: 1; min-width: 150px; }
        .slider-group span { font-weight: bold; min-width: 3ch; display: inline-block; }
        .button-group { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        button { padding: 0.7rem 1.2rem; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: #007aff; color: white; font-weight: 500; transition: background 0.2s; display: inline-flex; align-items: center; gap: 0.3rem; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        button.secondary { background: #e0e0e0; color: #333; }
        button.auto { background: #34c759; }
        .result { margin-top: 1rem; }
        .result img { width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .result a { display: none; margin-top: 0.5rem; color: #007aff; text-decoration: none; font-weight: 500; }
        .status { padding: 0.5rem; background: #fff; border-radius: 8px; font-size: 0.9rem; text-align: center; }
        .status.error { color: #d32f2f; }
        .status.ok { color: #2e7d32; }
        /* Efecto flash */
        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.1s; }
        .flash.active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="flash" id="flash"></div>
    <div class="app">
        <div class="header"><h1>Escáner Inteligente</h1></div>
        <div id="status" class="status">Iniciando...</div>
        <div class="viewfinder" id="viewfinder">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="previewCanvas"></canvas>
        </div>
        <div class="controls">
            <div class="slider-group">
                <label for="thresholdSlider">Sensibilidad:</label>
                <input type="range" id="thresholdSlider" min="80" max="180" value="120" step="1">
                <span id="thresholdValue">120</span>
            </div>
            <div class="button-group">
                <button id="captureBtn" disabled>📸 Capturar</button>
                <button id="autoBtn" class="auto" disabled>🪄 Auto</button>
                <button id="downloadBtn" class="secondary" disabled>⬇️ Descargar</button>
            </div>
        </div>
        <div class="result">
            <img id="resultImage" alt="Documento procesado">
            <a id="downloadLink" href="#" download="documento.png">Descargar PNG</a>
        </div>
    </div>

    <script>
    /**
     * Escáner de Documentos - Versión 2.0 con ráfaga, alineación, fusión y guía A4
     * Arquitectura modular orientada a eventos, preparada para hexagonal.
     */

    /* ===================== MICRO EVENT EMITTER ===================== */
    class EventEmitter {
        constructor() { this._events = {}; }
        on(event, listener) { if (!this._events[event]) this._events[event] = []; this._events[event].push(listener); return this; }
        off(event, listener) { if (!this._events[event]) return; this._events[event] = this._events[event].filter(l => l !== listener); }
        emit(event, ...args) { if (this._events[event]) this._events[event].forEach(l => l(...args)); }
    }

    /* ===================== CAMERA SERVICE ===================== */
    class CameraService extends EventEmitter {
        constructor() { super(); this.stream = null; this.videoElement = null; this._frameLoop = null; }
        async start(videoElement) {
            this.videoElement = videoElement;
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
                this.videoElement.srcObject = this.stream;
                await this.videoElement.play();
                this._startFrameLoop();
                this.emit('ready');
            } catch (err) { this.emit('error', err); }
        }
        _startFrameLoop() {
            const emit = () => {
                if (this.videoElement && this.videoElement.readyState >= 2) this.emit('frame', this.videoElement);
                this._frameLoop = requestAnimationFrame(emit);
            };
            emit();
        }
        stop() {
            if (this._frameLoop) cancelAnimationFrame(this._frameLoop);
            if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
            if (this.videoElement) this.videoElement.srcObject = null;
            this.emit('stop');
        }
        captureFrame() {
            if (!this.videoElement) throw new Error('Video no inicializado');
            const canvas = document.createElement('canvas');
            canvas.width = this.videoElement.videoWidth;
            canvas.height = this.videoElement.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(this.videoElement, 0, 0);
            return ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
        /** Captura ráfaga de N frames (espera entre capturas para diferente movimiento) */
        async captureBurst(count = 3, delayMs = 100) {
            const frames = [];
            for (let i = 0; i < count; i++) {
                frames.push(this.captureFrame());
                if (i < count - 1) await new Promise(r => setTimeout(r, delayMs));
            }
            return frames;
        }
    }

    /* ===================== IMAGE PROCESSOR ===================== */
    class ImageProcessor {
        /**
         * Binarización con normalización de iluminación (fondo blanco, texto negro)
         * @param {ImageData} imageData
         * @param {number} threshold umbral 0-255
         * @returns {ImageData}
         */
        static process(imageData, threshold = 120) {
            const { data, width, height } = imageData;
            const gray = new Float32Array(width * height);
            for (let i = 0; i < data.length; i += 4) gray[i>>2] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];

            const blurSize = 41, half = Math.floor(blurSize/2);
            const integral = new Float64Array(width * height);
            for (let y=0; y<height; y++) {
                let rowSum = 0;
                for (let x=0; x<width; x++) {
                    rowSum += gray[y*width + x];
                    integral[y*width + x] = (y===0) ? rowSum : integral[(y-1)*width + x] + rowSum;
                }
            }
            const blurred = new Float32Array(width * height);
            for (let y=0; y<height; y++) {
                for (let x=0; x<width; x++) {
                    const x1 = Math.max(x - half, 0), y1 = Math.max(y - half, 0);
                    const x2 = Math.min(x + half, width-1), y2 = Math.min(y + half, height-1);
                    let sum = integral[y2*width + x2];
                    if (y1>0) sum -= integral[(y1-1)*width + x2];
                    if (x1>0) sum -= integral[y2*width + (x1-1)];
                    if (y1>0 && x1>0) sum += integral[(y1-1)*width + (x1-1)];
                    const area = (x2-x1+1)*(y2-y1+1);
                    blurred[y*width + x] = sum / area;
                }
            }
            const normalized = new Float32Array(width * height);
            for (let i=0; i<normalized.length; i++) normalized[i] = Math.min(255, (gray[i]/(blurred[i]+0.001))*255);

            const outData = new Uint8ClampedArray(data.length);
            for (let i=0; i<data.length; i+=4) {
                const val = normalized[i>>2] < threshold ? 0 : 255;
                outData[i]=val; outData[i+1]=val; outData[i+2]=val; outData[i+3]=255;
            }
            return this._medianFilter(new ImageData(outData, width, height));
        }

        /** Filtro de mediana 3x3 para limpiar ruido binario */
        static _medianFilter(imageData) {
            const { data, width, height } = imageData;
            const result = new Uint8ClampedArray(data);
            for (let y=1; y<height-1; y++) {
                for (let x=1; x<width-1; x++) {
                    let whites = 0;
                    for (let dy=-1; dy<=1; dy++)
                        for (let dx=-1; dx<=1; dx++) {
                            const idx = ((y+dy)*width + (x+dx))*4;
                            if (data[idx] === 255) whites++;
                        }
                    const median = whites >= 5 ? 255 : 0;
                    const idx = (y*width + x)*4;
                    result[idx]=result[idx+1]=result[idx+2]=median;
                }
            }
            return new ImageData(result, width, height);
        }

        /**
         * Alineación simple: calcula el desplazamiento que minimiza SAD entre dos imágenes en grises.
         * @param {ImageData} ref referencia (se asume fija)
         * @param {ImageData} mov imagen a alinear
         * @returns {{dx:number, dy:number}} desplazamiento
         */
        static getAlignment(ref, mov, searchRange = 5) {
            const refGray = this._toGray(ref);
            const movGray = this._toGray(mov);
            let minSad = Infinity, bestDx = 0, bestDy = 0;
            for (let dy = -searchRange; dy <= searchRange; dy++) {
                for (let dx = -searchRange; dx <= searchRange; dx++) {
                    let sad = 0, count = 0;
                    for (let y = Math.max(0, -dy); y < Math.min(ref.height, mov.height - dy); y++) {
                        const refRow = y * ref.width;
                        const movRow = (y + dy) * mov.width;
                        for (let x = Math.max(0, -dx); x < Math.min(ref.width, mov.width - dx); x++) {
                            sad += Math.abs(refGray[refRow + x] - movGray[movRow + x + dx]);
                            count++;
                        }
                    }
                    sad /= count;
                    if (sad < minSad) { minSad = sad; bestDx = dx; bestDy = dy; }
                }
            }
            return { dx: bestDx, dy: bestDy };
        }

        static _toGray(imageData) {
            const { data, width, height } = imageData;
            const gray = new Float32Array(width * height);
            for (let i=0; i<data.length; i+=4) gray[i>>2] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            return gray;
        }

        /**
         * Fusión por mediana de varias imágenes alineadas respecto a la primera.
         * @param {ImageData[]} frames
         * @returns {ImageData}
         */
        static fuseByMedian(frames) {
            if (frames.length === 0) throw new Error('Sin frames');
            const ref = frames[0];
            const aligned = [ref];
            for (let i = 1; i < frames.length; i++) {
                const { dx, dy } = this.getAlignment(ref, frames[i]);
                aligned.push(this._translate(frames[i], dx, dy));
            }
            const { width, height } = ref;
            const result = new Uint8ClampedArray(width * height * 4);
            const tmp = new Uint8Array(frames.length);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    for (let i = 0; i < aligned.length; i++) {
                        const idx = (y * width + x) * 4;
                        tmp[i] = aligned[i].data[idx]; // asumimos R=G=B
                    }
                    tmp.sort();
                    const median = tmp[Math.floor(tmp.length/2)];
                    const outIdx = (y * width + x) * 4;
                    result[outIdx] = result[outIdx+1] = result[outIdx+2] = median;
                    result[outIdx+3] = 255;
                }
            }
            return new ImageData(result, width, height);
        }

        static _translate(imageData, dx, dy) {
            const { data, width, height } = imageData;
            const newData = new Uint8ClampedArray(data.length);
            for (let y=0; y<height; y++) {
                const srcY = y - dy;
                if (srcY < 0 || srcY >= height) continue;
                for (let x=0; x<width; x++) {
                    const srcX = x - dx;
                    if (srcX < 0 || srcX >= width) continue;
                    const srcIdx = (srcY * width + srcX) * 4;
                    const dstIdx = (y * width + x) * 4;
                    newData[dstIdx]=data[srcIdx]; newData[dstIdx+1]=data[srcIdx+1];
                    newData[dstIdx+2]=data[srcIdx+2]; newData[dstIdx+3]=data[srcIdx+3];
                }
            }
            return new ImageData(newData, width, height);
        }
    }

    /* ===================== UI CONTROLLER ===================== */
    class UIController {
        constructor() {
            // DOM elements
            this.statusDiv = document.getElementById('status');
            this.video = document.getElementById('video');
            this.previewCanvas = document.getElementById('previewCanvas');
            this.previewCtx = this.previewCanvas.getContext('2d');
            this.captureBtn = document.getElementById('captureBtn');
            this.autoBtn = document.getElementById('autoBtn');
            this.downloadBtn = document.getElementById('downloadBtn');
            this.downloadLink = document.getElementById('downloadLink');
            this.resultImage = document.getElementById('resultImage');
            this.thresholdSlider = document.getElementById('thresholdSlider');
            this.thresholdValue = document.getElementById('thresholdValue');
            this.flashOverlay = document.getElementById('flash');

            this.cameraService = new CameraService();
            this.isCameraReady = false;
            this.lastFrame = null; // almacena el último frame ImageData
            this.currentThreshold = parseInt(this.thresholdSlider.value, 10);
            this.stable = false; // quietud del móvil
            this.lastFrameForMotion = null; // para comparar movimiento

            // Eventos UI
            this.captureBtn.addEventListener('click', () => this.onCapture());
            this.autoBtn.addEventListener('click', () => this.onAuto());
            this.thresholdSlider.addEventListener('input', (e) => {
                this.currentThreshold = parseInt(e.target.value, 10);
                this.thresholdValue.textContent = this.currentThreshold;
            });

            // Eventos cámara
            this.cameraService.on('ready', () => this.onCameraReady());
            this.cameraService.on('frame', (videoEl) => this.onFrame(videoEl));
            this.cameraService.on('error', (err) => this.onCameraError(err));
            this.cameraService.on('stop', () => this.onCameraStop());
        }

        async init() {
            this.setStatus('Solicitando cámara...', 'ok');
            try { await this.cameraService.start(this.video); }
            catch (e) { /* gestionado en onCameraError */ }
        }

        onCameraReady() {
            this.isCameraReady = true;
            this.captureBtn.disabled = false;
            this.autoBtn.disabled = false;
            this.setStatus('Cámara lista. Centra el documento y pulsa Capturar.', 'ok');
            this.previewCanvas.width = this.video.videoWidth;
            this.previewCanvas.height = this.video.videoHeight;
        }

        onFrame(videoElement) {
            if (!this.isCameraReady) return;
            const frame = this.cameraService.captureFrame();
            this.lastFrame = frame; // guardar el último frame para captura

            // Previsualización en vivo: procesar con umbral actual
            const processed = ImageProcessor.process(frame, this.currentThreshold);
            this.previewCtx.putImageData(processed, 0, 0);

            // Dibujar guía de encuadre A4
            this._drawGuideline(this.previewCtx, processed.width, processed.height);

            // Detección de quietud: comparar con frame anterior en baja resolución
            if (this.lastFrameForMotion) {
                const diff = this._frameDifference(frame, this.lastFrameForMotion);
                this.stable = diff < 30; // umbral empírico
            }
            this.lastFrameForMotion = this._downsample(frame);
        }

        _drawGuideline(ctx, width, height) {
            const margin = Math.min(width, height) * 0.05;
            const rectW = width - margin * 2;
            const rectH = rectW * Math.SQRT2; // proporción A4: 1:√2
            const x = (width - rectW) / 2;
            const y = (height - rectH) / 2;

            ctx.save();
            ctx.strokeStyle = this.stable ? '#4caf50' : '#ffffff';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.strokeRect(x, y, rectW, rectH);
            ctx.restore();
        }

        _downsample(imageData) {
            const scale = 0.1; // reducido para comparación
            const w = Math.floor(imageData.width * scale);
            const h = Math.floor(imageData.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(this.video, 0, 0, w, h);
            return ctx.getImageData(0, 0, w, h);
        }

        _frameDifference(img1, img2) {
            const d1 = img1.data, d2 = img2.data;
            let sum = 0;
            for (let i=0; i<d1.length; i+=4) sum += Math.abs(d1[i] - d2[i]);
            return sum / (img1.width * img1.height);
        }

        // Captura normal con ráfaga
        async onCapture() {
            this.setStatus('Capturando ráfaga...', 'ok');
            this._triggerFlash();
            try {
                const frames = await this.cameraService.captureBurst(3, 80);
                const fused = ImageProcessor.fuseByMedian(frames);
                const processed = ImageProcessor.process(fused, this.currentThreshold);
                this._showResult(processed);
                this.setStatus('Documento procesado.', 'ok');
            } catch (e) {
                this.setStatus('Error en ráfaga: ' + e.message, 'error');
            }
        }

        // Modo automático
        async onAuto() {
            this.setStatus('Modo automático: analizando...', 'ok');
            this._triggerFlash();
            try {
                const frames = await this.cameraService.captureBurst(3, 80);
                const fused = ImageProcessor.fuseByMedian(frames);
                // Auto-umbral: media de la imagen fusionada (fondo oscuro => umbral bajo)
                const gray = ImageProcessor._toGray(fused);
                const avg = gray.reduce((a,b)=>a+b, 0) / gray.length;
                const autoThresh = Math.max(80, Math.min(160, Math.round(avg * 1.2)));
                const processed = ImageProcessor.process(fused, autoThresh);
                this._showResult(processed);
                this.setStatus(`Procesado automático (umbral: ${autoThresh}).`, 'ok');
            } catch (e) {
                this.setStatus('Error en auto: ' + e.message, 'error');
            }
        }

        _showResult(processedImage) {
            const canvas = document.createElement('canvas');
            canvas.width = processedImage.width;
            canvas.height = processedImage.height;
            canvas.getContext('2d').putImageData(processedImage, 0, 0);
            const dataURL = canvas.toDataURL('image/png');
            this.resultImage.src = dataURL;
            this.resultImage.style.display = 'block';
            this.downloadLink.href = dataURL;
            this.downloadLink.style.display = 'inline';
            this.downloadBtn.disabled = false;
        }

        _triggerFlash() {
            this.flashOverlay.classList.add('active');
            setTimeout(() => this.flashOverlay.classList.remove('active'), 100);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        onCameraError(error) {
            this.isCameraReady = false;
            let msg = error.name === 'NotAllowedError' ? 'Permiso denegado.' :
                      error.name === 'NotFoundError' ? 'Cámara no encontrada.' : error.message;
            this.setStatus(msg, 'error');
            this.enterSimulationMode();
        }

        onCameraStop() {
            this.isCameraReady = false;
            this.captureBtn.disabled = true;
            this.autoBtn.disabled = true;
        }

        setStatus(msg, type='ok') {
            this.statusDiv.textContent = msg;
            this.statusDiv.className = `status ${type}`;
        }

        enterSimulationMode() {
            this.setStatus('Modo simulación. Prueba con imagen sintética.', 'error');
            const w=640, h=480;
            const canvas = document.createElement('canvas');
            canvas.width=w; canvas.height=h;
            const ctx=canvas.getContext('2d');
            ctx.fillStyle='#f9f9f9'; ctx.fillRect(0,0,w,h);
            ctx.fillStyle='#222'; ctx.font='22px sans-serif';
            ctx.fillText('Documento simulado', 30, 80);
            ctx.fillText('Ráfaga: 3 capturas y fusión', 30, 130);
            ctx.fillText('Alineación automática', 30, 180);
            ctx.strokeStyle='#555'; ctx.lineWidth=1;
            for (let i=0;i<5;i++) { ctx.strokeRect(20+i*5, 200+i*5, 100, 40); }
            const simFrame = ctx.getImageData(0,0,w,h);
            this.lastFrame = simFrame;
            this.isCameraReady = true;
            this.captureBtn.disabled = false;
            this.autoBtn.disabled = false;
            // Mostrar previsualización procesada
            const processed = ImageProcessor.process(simFrame, this.currentThreshold);
            this.previewCanvas.width = w; this.previewCanvas.height = h;
            this.previewCtx.putImageData(processed, 0, 0);
        }
    }

    // Arranque
    const app = new UIController();
    app.init();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
