<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiador Geométrico de Documentos</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; }
        .app { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .header { text-align: center; margin-bottom: 1rem; }
        .dropzone { border: 2px dashed #aaa; border-radius: 12px; padding: 2rem; text-align: center; background: #fff; margin-bottom: 1rem; transition: border-color 0.2s; }
        .dropzone.dragover { border-color: #007aff; background: #e8f0fe; }
        .preview { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin: 1rem 0; }
        .preview img, .preview canvas { max-width: 400px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 1rem 0; }
        button { padding: 0.7rem 1.2rem; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; background: #007aff; color: white; font-weight: 500; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        button.secondary { background: #e0e0e0; color: #333; }
        .status { padding: 0.5rem; background: #fff; border-radius: 8px; font-size: 0.9rem; text-align: center; margin: 0.5rem 0; }
        .status.error { color: #d32f2f; }
        .status.ok { color: #2e7d32; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h1>Copiador Geométrico de Documentos</h1></div>
        <div id="status" class="status">Carga una imagen o arrastra aquí</div>
        <div class="dropzone" id="dropzone">
            <p>Arrastra una imagen o</p>
            <button id="loadBtn" class="secondary">Seleccionar archivo</button>
            <button id="simulateBtn" class="secondary" style="margin-left:0.5rem;">Probar con muestra</button>
        </div>
        <div class="preview" id="previewContainer"></div>
        <div class="controls">
            <button id="processBtn" disabled>🔍 Reconstruir documento</button>
            <button id="downloadBtn" disabled>⬇️ Descargar PNG</button>
        </div>
        <div class="preview" id="outputContainer"></div>
    </div>

    <script>
    /**
     * Copiador Geométrico de Documentos - v1.0
     * Reconstruye un documento copiando la geometría de las letras (momentos de Hu)
     * sin necesidad de OCR ni redes neuronales.
     * Arquitectura modular orientada a eventos, preparada para hexagonal.
     */

    // ==================== MICRO EVENT EMITTER ====================
    class EventEmitter {
        constructor() { this._events = {}; }
        on(event, listener) { if (!this._events[event]) this._events[event] = []; this._events[event].push(listener); return this; }
        off(event, listener) { if (!this._events[event]) return; this._events[event] = this._events[event].filter(l => l !== listener); }
        emit(event, ...args) { if (this._events[event]) this._events[event].forEach(l => l(...args)); }
    }

    // ==================== WORKER: Preprocesamiento de imagen ====================
    const workerCode = `
        function normalizeAndBinarize(imageData, threshold) {
            const { data, width, height } = imageData;
            const gray = new Float32Array(width * height);
            for (let i = 0; i < data.length; i += 4) gray[i>>2] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];

            const blurSize = 41, half = Math.floor(blurSize/2);
            const integral = new Float64Array(width * height);
            for (let y=0; y<height; y++) {
                let rowSum = 0;
                for (let x=0; x<width; x++) {
                    rowSum += gray[y*width + x];
                    integral[y*width + x] = (y===0) ? rowSum : integral[(y-1)*width + x] + rowSum;
                }
            }
            const blurred = new Float32Array(width * height);
            for (let y=0; y<height; y++) {
                for (let x=0; x<width; x++) {
                    const x1 = Math.max(x - half, 0), y1 = Math.max(y - half, 0);
                    const x2 = Math.min(x + half, width-1), y2 = Math.min(y + half, height-1);
                    let sum = integral[y2*width + x2];
                    if (y1>0) sum -= integral[(y1-1)*width + x2];
                    if (x1>0) sum -= integral[y2*width + (x1-1)];
                    if (y1>0 && x1>0) sum += integral[(y1-1)*width + (x1-1)];
                    const area = (x2-x1+1)*(y2-y1+1);
                    blurred[y*width + x] = sum / area;
                }
            }
            const normalized = new Float32Array(width * height);
            for (let i=0; i<normalized.length; i++) normalized[i] = Math.min(255, (gray[i]/(blurred[i]+0.001))*255);

            const outData = new Uint8ClampedArray(data.length);
            for (let i=0; i<data.length; i+=4) {
                const val = normalized[i>>2] < threshold ? 0 : 255;
                outData[i]=val; outData[i+1]=val; outData[i+2]=val; outData[i+3]=255;
            }
            // Filtro de mediana 3x3 simple
            const filtered = new Uint8ClampedArray(outData);
            for (let y=1; y<height-1; y++) {
                for (let x=1; x<width-1; x++) {
                    let whites = 0;
                    for (let dy=-1; dy<=1; dy++)
                        for (let dx=-1; dx<=1; dx++) {
                            const idx = ((y+dy)*width + (x+dx))*4;
                            if (outData[idx] === 255) whites++;
                        }
                    const median = whites >= 5 ? 255 : 0;
                    const idx = (y*width + x)*4;
                    filtered[idx]=filtered[idx+1]=filtered[idx+2]=median;
                }
            }
            return new ImageData(filtered, width, height);
        }

        self.onmessage = function(e) {
            const { id, type, payload } = e.data;
            if (type === 'preprocess') {
                const { imageData, threshold } = payload;
                const processed = normalizeAndBinarize(imageData, threshold || 120);
                self.postMessage({ id, result: processed }, [processed.data.buffer]);
            }
        };
    `;
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(workerBlob);
    const preprocessWorker = new Worker(workerUrl);

    // ==================== SERVICIOS ====================
    class FileLoader extends EventEmitter {
        constructor(dropzone, fileInput) {
            super();
            this.dropzone = dropzone;
            this.fileInput = fileInput;
            this._setupEvents();
        }
        _setupEvents() {
            this.dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                this.dropzone.classList.add('dragover');
            });
            this.dropzone.addEventListener('dragleave', () => this.dropzone.classList.remove('dragover'));
            this.dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                this.dropzone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length) this._loadFile(files[0]);
            });
            this.fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) this._loadFile(e.target.files[0]);
            });
        }
        _loadFile(file) {
            if (!file.type.startsWith('image/')) {
                this.emit('error', 'El archivo no es una imagen.');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    this.emit('imageLoaded', { imageData, dataURL: canvas.toDataURL() });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    class ImagePreprocessor {
        constructor(worker) {
            this.worker = worker;
            this.pending = new Map();
            this.nextId = 1;
            this.worker.onmessage = (e) => {
                const { id, result } = e.data;
                const p = this.pending.get(id);
                if (p) {
                    this.pending.delete(id);
                    p.resolve(result);
                }
            };
        }
        async process(imageData, threshold = 120) {
            return new Promise((resolve, reject) => {
                const id = this.nextId++;
                this.pending.set(id, { resolve, reject });
                this.worker.postMessage({ id, type: 'preprocess', payload: { imageData, threshold } }, [imageData.data.buffer]);
            });
        }
    }

    // ==================== MOMENTOS DE HU ====================
    class HuMoments {
        /**
         * Calcula los 7 momentos invariantes de Hu para una imagen binaria.
         * @param {ImageData} imageData - imagen binaria (0 y 255)
         * @returns {number[]} array con los 7 momentos
         */
        static calculate(imageData) {
            const { data, width, height } = imageData;
            // Momentos geométricos (m_pq)
            let m00 = 0, m10 = 0, m01 = 0;
            const xCoords = [], yCoords = [];
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    if (data[idx] === 0) { // consideramos negro como objeto
                        m00++;
                        m10 += x;
                        m01 += y;
                        xCoords.push(x);
                        yCoords.push(y);
                    }
                }
            }
            if (m00 === 0) return [0,0,0,0,0,0,0]; // sin objeto

            const xc = m10 / m00;
            const yc = m01 / m00;

            // Momentos centrales (mu_pq)
            let mu20 = 0, mu02 = 0, mu11 = 0, mu30 = 0, mu03 = 0, mu21 = 0, mu12 = 0;
            for (let i = 0; i < xCoords.length; i++) {
                const dx = xCoords[i] - xc;
                const dy = yCoords[i] - yc;
                mu20 += dx * dx;
                mu02 += dy * dy;
                mu11 += dx * dy;
                mu30 += dx * dx * dx;
                mu03 += dy * dy * dy;
                mu21 += dx * dx * dy;
                mu12 += dx * dy * dy;
            }

            // Normalizar
            const norm = Math.pow(m00, 1 + (2+2)/2); // para n20,n02,n11
            const nu20 = mu20 / norm;
            const nu02 = mu02 / norm;
            const nu11 = mu11 / norm;
            const norm3 = Math.pow(m00, 1 + (3)/2); // para n30,n03,n21,n12
            const nu30 = mu30 / norm3;
            const nu03 = mu03 / norm3;
            const nu21 = mu21 / norm3;
            const nu12 = mu12 / norm3;

            // Momentos de Hu
            const h1 = nu20 + nu02;
            const h2 = (nu20 - nu02) * (nu20 - nu02) + 4 * nu11 * nu11;
            const h3 = (nu30 - 3*nu12) * (nu30 - 3*nu12) + (3*nu21 - nu03) * (3*nu21 - nu03);
            const h4 = (nu30 + nu12) * (nu30 + nu12) + (nu21 + nu03) * (nu21 + nu03);
            const h5 = (nu30 - 3*nu12) * (nu30 + nu12) * ( (nu30 + nu12)*(nu30 + nu12) - 3*(nu21 + nu03)*(nu21 + nu03) )
                     + (3*nu21 - nu03) * (nu21 + nu03) * ( 3*(nu30 + nu12)*(nu30 + nu12) - (nu21 + nu03)*(nu21 + nu03) );
            const h6 = (nu20 - nu02) * ( (nu30 + nu12)*(nu30 + nu12) - (nu21 + nu03)*(nu21 + nu03) )
                     + 4 * nu11 * (nu30 + nu12) * (nu21 + nu03);
            const h7 = (3*nu21 - nu03) * (nu30 + nu12) * ( (nu30 + nu12)*(nu30 + nu12) - 3*(nu21 + nu03)*(nu21 + nu03) )
                     - (nu30 - 3*nu12) * (nu21 + nu03) * ( 3*(nu30 + nu12)*(nu30 + nu12) - (nu21 + nu03)*(nu21 + nu03) );

            return [h1, h2, h3, h4, h5, h6, h7];
        }
    }

    // ==================== BASE DE DATOS DE GLIFOS ====================
    class GlyphDatabase {
        constructor() {
            this.glyphs = {}; // { font: { char: [h1..h7] } }
            this.charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,;:!?¿';
            this.fonts = ['Arial', 'Times New Roman', 'Courier New'];
            this._buildDatabase();
        }

        _buildDatabase() {
            // Para cada fuente y cada carácter, renderizamos y calculamos Hu
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            for (const font of this.fonts) {
                this.glyphs[font] = {};
                for (const char of this.charSet) {
                    ctx.clearRect(0, 0, 64, 64);
                    ctx.fillStyle = '#000';
                    ctx.font = `48px "${font}"`;
                    ctx.textBaseline = 'middle';
                    ctx.textAlign = 'center';
                    ctx.fillText(char, 32, 32);
                    // Recortar bounding box apretado para Hu preciso
                    const imageData = ctx.getImageData(0, 0, 64, 64);
                    const bbox = this._getTightBBox(imageData);
                    if (!bbox) {
                        // carácter inexistente (por ejemplo, '¿' en Courier?), omitimos
                        continue;
                    }
                    const cropped = this._cropImageData(imageData, bbox);
                    const hu = HuMoments.calculate(cropped);
                    this.glyphs[font][char] = hu;
                }
            }
        }

        _getTightBBox(imageData) {
            const { data, width, height } = imageData;
            let minX = width, maxX = 0, minY = height, maxY = 0;
            let found = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    if (data[idx] < 128) { // oscuro
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            return found ? { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 } : null;
        }

        _cropImageData(imageData, bbox) {
            const { x, y, w, h } = bbox;
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.putImageData(imageData, -x, -y);
            return ctx.getImageData(0, 0, w, h);
        }

        /**
         * Busca el carácter y fuente más cercanos a unos momentos Hu dados.
         * @param {number[]} hu - 7 momentos
         * @returns {{char: string, font: string, distance: number}}
         */
        findBestMatch(hu) {
            let bestChar = ' ';
            let bestFont = 'Arial';
            let minDist = Infinity;
            for (const font of this.fonts) {
                const fontGlyphs = this.glyphs[font];
                for (const char in fontGlyphs) {
                    const dist = this._euclideanDistance(hu, fontGlyphs[char]);
                    if (dist < minDist) {
                        minDist = dist;
                        bestChar = char;
                        bestFont = font;
                    }
                }
            }
            return { char: bestChar, font: bestFont, distance: minDist };
        }

        _euclideanDistance(a, b) {
            let sum = 0;
            for (let i = 0; i < a.length; i++) sum += (a[i] - b[i]) ** 2;
            return Math.sqrt(sum);
        }
    }

    // ==================== EXTRACTOR DE COMPONENTES CONECTADAS ====================
    class ConnectedComponents {
        /**
         * Extrae todas las componentes conectadas (negro sobre blanco).
         * @param {ImageData} binaryImage
         * @returns {Array} [{ bbox, imageData }]
         */
        static extract(binaryImage) {
            const { data, width, height } = binaryImage;
            const visited = new Uint8Array(width * height);
            const components = [];
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (data[idx*4] === 0 && !visited[idx]) {
                        const comp = this._extractComponent(binaryImage, x, y, visited);
                        if (comp) components.push(comp);
                    }
                }
            }
            return components;
        }

        static _extractComponent(imageData, startX, startY, visited) {
            const { data, width, height } = imageData;
            const queue = [[startX, startY]];
            visited[startY * width + startX] = 1;
            const pixels = [];
            let minX = startX, maxX = startX, minY = startY, maxY = startY;
            while (queue.length) {
                const [x, y] = queue.pop();
                pixels.push({x, y});
                minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                            const idx = ny * width + nx;
                            if (data[idx*4] === 0 && !visited[idx]) {
                                visited[idx] = 1;
                                queue.push([nx, ny]);
                            }
                        }
                    }
                }
            }
            const w = maxX - minX + 1, h = maxY - minY + 1;
            if (w < 2 || h < 2) return null; // ruido mínimo

            // Crear ImageData recortado
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            const compImageData = ctx.createImageData(w, h);
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const srcIdx = ((minY + y) * width + (minX + x)) * 4;
                    const dstIdx = (y * w + x) * 4;
                    // Copiar píxel si pertenece al componente, sino blanco
                    if (data[srcIdx] === 0) {
                        compImageData.data[dstIdx] = 0;
                        compImageData.data[dstIdx+1] = 0;
                        compImageData.data[dstIdx+2] = 0;
                        compImageData.data[dstIdx+3] = 255;
                    } else {
                        compImageData.data[dstIdx] = 255;
                        compImageData.data[dstIdx+1] = 255;
                        compImageData.data[dstIdx+2] = 255;
                        compImageData.data[dstIdx+3] = 255;
                    }
                }
            }
            return { bbox: { x: minX, y: minY, w, h }, imageData: compImageData };
        }
    }

    // ==================== RECONSTRUCTOR DEL DOCUMENTO ====================
    class DocumentReconstructor {
        /**
         * Reconstruye el documento combinando las componentes clasificadas.
         * @param {object} sourceImageData - imagen original (ImageData) para fondo
         * @param {Array} components - resultado de clasificar cada componente con { bbox, char, font }
         * @returns {HTMLCanvasElement}
         */
        static reconstruct(sourceImageData, components) {
            const canvas = document.createElement('canvas');
            canvas.width = sourceImageData.width;
            canvas.height = sourceImageData.height;
            const ctx = canvas.getContext('2d');

            // Fondo blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Opcional: dibujar imagen original atenuada (para sellos, etc.)
            // No lo incluimos para mantener pureza geométrica.

            // Dibujar cada carácter con la fuente y posición originales
            for (const comp of components) {
                const { bbox, char, font } = comp;
                const fontSize = Math.min(bbox.h * 1.2, 48); // ajustar tamaño
                ctx.fillStyle = '#000000';
                ctx.font = `${fontSize}px "${font}"`;
                ctx.textBaseline = 'top';
                ctx.textAlign = 'left';
                // Ajustar posición para centrar en bounding box original
                const textWidth = ctx.measureText(char).width;
                const xOffset = (bbox.w - textWidth) / 2;
                const yOffset = (bbox.h - fontSize) / 2;
                ctx.fillText(char, bbox.x + xOffset, bbox.y + yOffset);
            }
            return canvas;
        }
    }

    // ==================== UI CONTROLLER ====================
    class UIController {
        constructor() {
            this.statusDiv = document.getElementById('status');
            this.dropzone = document.getElementById('dropzone');
            this.loadBtn = document.getElementById('loadBtn');
            this.simulateBtn = document.getElementById('simulateBtn');
            this.processBtn = document.getElementById('processBtn');
            this.downloadBtn = document.getElementById('downloadBtn');
            this.previewContainer = document.getElementById('previewContainer');
            this.outputContainer = document.getElementById('outputContainer');

            this.fileLoader = new FileLoader(this.dropzone, this.loadBtn);
            this.preprocessor = new ImagePreprocessor(preprocessWorker);
            this.glyphDB = new GlyphDatabase();

            this.sourceImageData = null;
            this.binaryImageData = null;
            this.components = [];

            this.fileLoader.on('imageLoaded', (payload) => this.onImageLoaded(payload));
            this.fileLoader.on('error', (msg) => this.setStatus(msg, 'error'));
            this.simulateBtn.addEventListener('click', () => this.simulate());
            this.processBtn.addEventListener('click', () => this.process());
            this.downloadBtn.addEventListener('click', () => this.downloadResult());
        }

        onImageLoaded({ imageData, dataURL }) {
            this.sourceImageData = imageData;
            this.showPreview(dataURL);
            this.processBtn.disabled = false;
            this.downloadBtn.disabled = true;
            this.setStatus('Imagen cargada. Pulsa "Reconstruir documento".', 'ok');
        }

        async process() {
            if (!this.sourceImageData) return;
            this.setStatus('Preprocesando imagen...', 'ok');
            this.processBtn.disabled = true;

            try {
                // 1. Binarizar
                this.binaryImageData = await this.preprocessor.process(this.sourceImageData, 120);
                // 2. Extraer componentes
                this.components = ConnectedComponents.extract(this.binaryImageData);
                this.setStatus(`Componentes detectadas: ${this.components.length}. Clasificando...`, 'ok');

                // 3. Clasificar cada componente con Hu
                const classified = [];
                for (const comp of this.components) {
                    const hu = HuMoments.calculate(comp.imageData);
                    const match = this.glyphDB.findBestMatch(hu);
                    // Umbral de distancia para considerar válido (ajustar empíricamente)
                    if (match.distance < 0.5) { // valor experimental
                        classified.push({
                            bbox: comp.bbox,
                            char: match.char,
                            font: match.font,
                            distance: match.distance
                        });
                    } else {
                        // Si no coincide bien, lo dejamos como imagen original (no reconstruido)
                        // Para simplificar, ignoramos (queda hueco) o podríamos pegar el bitmap.
                    }
                }

                // 4. Reconstruir documento
                const resultCanvas = DocumentReconstructor.reconstruct(this.sourceImageData, classified);
                this.showOutput(resultCanvas);
                this.downloadBtn.disabled = false;
                this.setStatus(`Documento reconstruido con ${classified.length} caracteres.`, 'ok');
            } catch (error) {
                this.setStatus('Error: ' + error.message, 'error');
            }
            this.processBtn.disabled = false;
        }

        showPreview(dataURL) {
            this.previewContainer.innerHTML = `<img src="${dataURL}" alt="Original">`;
        }

        showOutput(canvas) {
            this.outputContainer.innerHTML = '';
            this.outputContainer.appendChild(canvas);
            // Guardar referencia para descarga
            this.resultCanvas = canvas;
        }

        downloadResult() {
            if (!this.resultCanvas) return;
            const link = document.createElement('a');
            link.download = 'documento_reconstruido.png';
            link.href = this.resultCanvas.toDataURL('image/png');
            link.click();
        }

        setStatus(message, type = 'ok') {
            this.statusDiv.textContent = message;
            this.statusDiv.className = `status ${type}`;
        }

        simulate() {
            const w = 800, h = 200;
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#000000';
            ctx.font = '32px "Times New Roman"';
            ctx.fillText('Documento de prueba', 30, 60);
            ctx.font = '24px "Arial"';
            ctx.fillText('con diferentes fuentes', 30, 100);
            ctx.font = '20px "Courier New"';
            ctx.fillText('y espacios   irregulares.', 30, 140);
            const imageData = ctx.getImageData(0, 0, w, h);
            const dataURL = canvas.toDataURL();
            this.onImageLoaded({ imageData, dataURL });
            this.setStatus('Imagen de muestra generada.', 'ok');
        }
    }

    // Arranque
    const app = new UIController();
    </script>
</body>
